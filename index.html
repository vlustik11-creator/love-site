<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>Любовное послание для Яники</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: black;
    overflow: hidden;
    font-family: Arial, sans-serif;
    flex-direction: column;
    color: white;
}

/* стартовый экран */
#intro {
    text-align: center;
    animation: fadeIn 2s;
}

#intro p {
    font-size: 24px;
    margin-bottom: 20px;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

/* сердце */
.heart {
    position: relative;
    width: 260px;
    height: 240px;
    background: red;
    transform: rotate(-45deg) scale(0);
    display: none;
    border-radius: 15px; /* мягкие края */
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 240px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -130px; }
.heart::after { left: 130px; }

/* контейнер для текста */
.text-container {
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%); /* центрирование без искажений */
    text-align: center;
    color: white;
    width: 180px; /* ширина текста внутри сердца */
}

.main-text {
    font-size: 20px;
    font-weight: bold;
    line-height: 1.4;
}

.sub-text {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.9;
}

/* анимации */
.show {
    display: block;
    animation: appear 1.5s forwards, beat 1s 1.5s infinite;
}

@keyframes appear {
    to { transform: rotate(-45deg) scale(1); }
}

@keyframes beat {
    0%,100% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.15); }
}

@keyframes fadeIn {
    from {opacity: 0;}
    to {opacity: 1;}
}

/* падающие сердца */
.falling-heart {
    position: absolute;
    color: rgba(255,0,0,0.7);
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<!-- стартовый экран -->
<div id="intro">
    <p>У меня для тебя кое-что есть… 💌</p>
    <button onclick="showLove()">Нажми</button>
</div>

<!-- сердце -->
<div id="heart" class="heart">
    <div class="text-container">
        <div id="loveText" class="main-text"></div>
        <div class="sub-text">от твоего любимого Владика 💖</div>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function showLove() {
    document.getElementById("intro").style.display = "none";
    document.body.style.background = "linear-gradient(135deg, #ff9a9e, #fad0c4)";

    const heart = document.getElementById("heart");
    const text = document.getElementById("loveText");

    text.innerHTML = "Я тебя люблю,<br>Яника ❤️";

    heart.classList.add("show");

    document.getElementById("music").play();

    setInterval(createHeart, 300);
}

function createHeart() {
    const h = document.createElement("div");
    h.classList.add("falling-heart");
    h.innerHTML = "❤️";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (15 + Math.random() * 25) + "px";
    h.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 8000);
}
</script>

</body>
</html>
