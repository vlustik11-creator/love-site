<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>❤️ Сюрприз</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    font-family: Arial, sans-serif;
    flex-direction: column;
}

button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
}

input {
    padding: 10px;
    font-size: 16px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

.heart {
    position: relative;
    width: 260px;
    height: 240px;
    background: red;
    transform: rotate(-45deg) scale(0);
    display: none;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 260px;
    height: 240px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -130px; }
.heart::after { left: 130px; }

.text {
    position: absolute;
    width: 100%;
    text-align: center;
    transform: rotate(45deg);
    top: 70px;
    left: 0;
    color: white;
}

.main-text {
    font-size: 22px;
    font-weight: bold;
    line-height: 1.4;
}

.sub-text {
    margin-top: 10px;
    font-size: 14px;
    opacity: 0.9;
}

.show {
    display: block;
    animation: appear 1.5s forwards, beat 1s 1.5s infinite;
}

@keyframes appear {
    to { transform: rotate(-45deg) scale(1); }
}

@keyframes beat {
    0%,100% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.15); }
}

.falling-heart {
    position: absolute;
    color: rgba(255,0,0,0.6);
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); }
    100% { transform: translateY(110vh); }
}
</style>
</head>

<body>

<input id="nameInput" placeholder="Введи имя ❤️">
<button onclick="startLove()">Нажми 💖</button>

<div id="heart" class="heart">
    <div class="text">
        <div id="loveText" class="main-text"></div>
        <div class="sub-text">от твоего любимого Владика 💖</div>
    </div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function startLove() {
    let name = document.getElementById("nameInput").value || "Яника";

    document.querySelector("button").style.display = "none";
    document.getElementById("nameInput").style.display = "none";

    const heart = document.getElementById("heart");
    const text = document.getElementById("loveText");

    text.innerHTML = "Я тебя люблю,<br>" + name + " ❤️";

    heart.classList.add("show");

    document.getElementById("music").play();

    setInterval(createHeart, 300);
}

function createHeart() {
    const h = document.createElement("div");
    h.classList.add("falling-heart");
    h.innerHTML = "❤️";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (15 + Math.random() * 25) + "px";
    h.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 8000);
}
</script>

</body>
</html>
