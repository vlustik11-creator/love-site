<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<title>❤️ Сюрприз</title>

<style>
body {
    margin: 0;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: linear-gradient(135deg, #ff9a9e, #fad0c4);
    overflow: hidden;
    font-family: Arial, sans-serif;
    flex-direction: column;
}

/* кнопка */
button {
    padding: 15px 25px;
    font-size: 18px;
    border: none;
    border-radius: 10px;
    background: #ff4d6d;
    color: white;
    cursor: pointer;
    transition: 0.3s;
}

button:hover {
    background: #ff1e4d;
}

/* поле ввода */
input {
    padding: 10px;
    font-size: 16px;
    margin-bottom: 15px;
    border-radius: 8px;
    border: none;
    text-align: center;
}

/* сердце */
.heart {
    position: relative;
    width: 220px;
    height: 200px;
    background: red;
    transform: rotate(-45deg) scale(0);
    display: none;
}

.heart::before,
.heart::after {
    content: "";
    position: absolute;
    width: 220px;
    height: 200px;
    background: red;
    border-radius: 50%;
}

.heart::before { top: -110px; }
.heart::after { left: 110px; }

.text {
    position: absolute;
    width: 100%;
    text-align: center;
    transform: rotate(45deg);
    top: 70px;
    color: white;
    font-size: 22px;
    font-weight: bold;
}

/* анимации */
.show {
    display: block;
    animation: appear 1.5s forwards, beat 1s 1.5s infinite;
}

@keyframes appear {
    to { transform: rotate(-45deg) scale(1); }
}

@keyframes beat {
    0%,100% { transform: rotate(-45deg) scale(1); }
    50% { transform: rotate(-45deg) scale(1.15); }
}

/* падающие сердечки */
.falling-heart {
    position: absolute;
    color: rgba(255,0,0,0.6);
    animation: fall linear infinite;
}

@keyframes fall {
    0% { transform: translateY(-10vh); opacity: 1; }
    100% { transform: translateY(110vh); opacity: 0; }
}
</style>
</head>

<body>

<input id="nameInput" placeholder="Введи имя ❤️">
<button onclick="startLove()">Нажми 💖</button>

<div id="heart" class="heart">
    <div id="loveText" class="text"></div>
</div>

<audio id="music" loop>
    <source src="https://www.bensound.com/bensound-music/bensound-romantic.mp3">
</audio>

<script>
function startLove() {
    let name = document.getElementById("nameInput").value || "Яника";

    document.querySelector("button").style.display = "none";
    document.getElementById("nameInput").style.display = "none";

    const heart = document.getElementById("heart");
    const text = document.getElementById("loveText");

    text.innerHTML = "Я тебя люблю, " + name + " ❤️";
    heart.classList.add("show");

    document.getElementById("music").play();

    // запускаем сердечки
    setInterval(createHeart, 300);
}

function createHeart() {
    const h = document.createElement("div");
    h.classList.add("falling-heart");
    h.innerHTML = "❤️";

    h.style.left = Math.random() * 100 + "vw";
    h.style.fontSize = (15 + Math.random() * 25) + "px";
    h.style.animationDuration = (3 + Math.random() * 5) + "s";

    document.body.appendChild(h);

    setTimeout(() => h.remove(), 8000);
}
</script>

</body>
</html>
